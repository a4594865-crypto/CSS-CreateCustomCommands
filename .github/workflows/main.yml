name: .NET 8 Build and Release

on:
  pull_request:
    branches:
      - main
  workflow_dispatch: # 加入手動觸發功能，方便測試

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # 升級到 v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4 # 升級到 v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      # 這裡路徑要確認跟你的 GitHub 儲存庫結構一致
      run: dotnet build ./CustomCommands/CustomCommands.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish ./CustomCommands/CustomCommands.csproj --configuration Release --no-build --output ./out

    - name: Zip artifacts
      run: |
        cd ./out
        zip -r CustomCommands.zip .

    - name: Create Release
      id: create_release
      # 這裡改用 softprops/action-gh-release，因為 actions/create-release 官方已停止維護
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      with:
        tag_name: ${{ github.event.pull_request.title }}
        name: ${{ github.event.pull_request.title }}
        body: ${{ github.event.pull_request.body }}
        draft: true
        prerelease: false
        files: ./out/CustomCommands.zip # 直接在這裡上傳，不用分兩步
