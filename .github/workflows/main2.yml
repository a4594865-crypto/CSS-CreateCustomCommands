name: Test Build v1.0.364

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # 允許手動點擊按鈕執行測試

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore ./CustomCommands/CustomCommands.csproj

    - name: Build Plugin
      # 使用 Release 模式編譯，確保效能最佳化
      run: dotnet build ./CustomCommands/CustomCommands.csproj --configuration Release --no-restore

    - name: Upload Build Artifact
      # 編譯成功後，會把 .dll 檔案放在 GitHub Actions 頁面供你下載
      uses: actions/upload-artifact@v4
      with:
        name: CustomCommands-v1.0.364
        path: |
          ./CustomCommands/bin/Release/net8.0/CustomCommands.dll
          ./CustomCommands/bin/Release/net8.0/CustomCommands.pdb
