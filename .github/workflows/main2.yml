name: Test Build v1.0.364

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # 允許手動點擊按鈕執行測試

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      # 確保指向正確的專案檔路徑
      run: dotnet restore ./CustomCommands/CustomCommands.csproj

    - name: Build Plugin
      # 使用 Release 模式編譯，產出優化過的 .dll
      run: dotnet build ./CustomCommands/CustomCommands.csproj --configuration Release --no-restore

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CustomCommands-v1.0.364
        # 使用萬用匹配路徑，解決資料夾層級對齊問題
        path: |
          **/bin/Release/net8.0/CustomCommands.dll
          **/bin/Release/net8.0/CustomCommands.pdb
        # 如果還是找不到檔案，讓工作流程直接顯示失敗，方便除錯
        if-no-files-found: error
